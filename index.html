<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title data-i18n="page.title">Via Baltica</title>
  <meta name="description" content="Private guided tours in Gdańsk with certified local guide Mark Jeziak. English &amp; Polish. Book your Baltic Sea city experience today." />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    rel="stylesheet"
    href="https://fonts.googleapis.com/css2?family=Source+Sans+3:ital,wght@0,300;0,400;0,600;0,700;1,300;1,400&family=Caveat:wght@600&display=swap"
  />
</head>
<body>

<input type="checkbox" id="menu-toggle" />

<main></main>

<script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "LocalBusiness",
    "name": "Via Baltica — Tour Guide Mark Jeziak",
    "description": "Private guided tours in Gdańsk and the Tri-City area with certified local guide Mark Jeziak.",
    "url": "https://viabaltica.com",
    "telephone": "",
    "image": "",
    "address": {
      "@type": "PostalAddress",
      "addressLocality": "Gdańsk",
      "addressCountry": "PL"
    },
    "geo": {
      "@type": "GeoCoordinates",
      "latitude": 54.3521,
      "longitude": 18.6464
    },
    "openingHours": "Mo-Su 08:00-20:00",
    "priceRange": "$$",
    "aggregateRating": {
      "@type": "AggregateRating",
      "ratingValue": "5.0",
      "reviewCount": "18"
    },
    "hasOfferCatalog": {
      "@type": "OfferCatalog",
      "name": "Guided Tours",
      "itemListElement": [
        { "@type": "Offer", "itemOffered": { "@type": "TouristTrip", "name": "Gdańsk City Tour" } },
        { "@type": "Offer", "itemOffered": { "@type": "TouristTrip", "name": "Baltic Coast Tour" } },
        { "@type": "Offer", "itemOffered": { "@type": "TouristTrip", "name": "Nature Day Trip" } }
      ]
    }
  }
</script>
<script type="module" src="/src/main.ts"></script>
</body>
</html>
