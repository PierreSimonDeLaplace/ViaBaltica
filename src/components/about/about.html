          <rect x="158" y="175" width="24" height="50" rx="8" fill="#c8a882" />
          <ellipse cx="170" cy="155" rx="48" ry="58" fill="#c8a882" />

          <!-- hair -->
          <path d="M122,138 Q125,90 170,88 Q215,90 218,138 Q210,110 170,108 Q130,110 122,138 Z" fill="#2c1f0e" />

          <path d="M218,138 Q222,155 218,175 Q215,155 212,145 Z" fill="#2c1f0e" />

          <path d="M245,280 Q265,305 272,335" stroke="#0e2240" stroke-width="28" stroke-linecap="round" fill="none" />

      <div class="portrait-name">Mark Jeziak</div>
      <div class="portrait-title" data-i18n="about.guideTitle">about.guideTitle</div>
      <div class="portrait-badges">
        <span class="portrait-badge" data-i18n="about.badge1">about.badge1</span>
        <span class="portrait-badge" data-i18n="about.badge2">about.badge2</span>
        <span class="portrait-badge" data-i18n="about.badge3">about.badge3</span>
      </div>
    </div>

    <div class="about-text">
      <div>
        <span class="about-label" data-i18n="about.badge">about.badge</span>
        <h2 data-i18n-html="about.heading">about.heading</h2>
      </div>

      <div class="about-body">
        <p data-i18n="about.p1">about.p1</p>
        <p data-i18n="about.p2">about.p2</p>
        <p data-i18n="about.p3">about.p3</p>
      </div>

      <div class="about-highlights">
        <div class="highlight-card">
          <div class="highlight-icon">🏛️</div>
          <div class="highlight-title" data-i18n="about.h1title">about.h1title</div>
          <div class="highlight-desc"  data-i18n="about.h1desc">about.h1desc</div>
        </div>
        <div class="highlight-card">
          <div class="highlight-icon">🌍</div>
          <div class="highlight-title" data-i18n="about.h2title">about.h2title</div>
          <div class="highlight-desc"  data-i18n="about.h2desc">about.h2desc</div>
        </div>
        <div class="highlight-card">
          <div class="highlight-icon">🗺️</div>
          <div class="highlight-title" data-i18n="about.h3title">about.h3title</div>
          <div class="highlight-desc"  data-i18n="about.h3desc">about.h3desc</div>
        </div>
        <div class="highlight-card">
          <div class="highlight-icon">⭐</div>
          <div class="highlight-title" data-i18n="about.h4title">about.h4title</div>
          <div class="highlight-desc"  data-i18n="about.h4desc">about.h4desc</div>
        </div>
      </div>

      <div class="about-cta">
        <a href="#trips" class="btn-primary" data-i18n="about.ctaTours">about.ctaTours</a>
        <a href="#contact" class="btn-outline" data-i18n="about.ctaContact">about.ctaContact</a>
      </div>

  </div>
</section>
