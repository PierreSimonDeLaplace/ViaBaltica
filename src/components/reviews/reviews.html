<section class="reviews-section" id="reviews">
  <div class="reviews-header">
    <span class="eyebrow" data-i18n="reviews.badge">reviews.badge</span>
    <h2 data-i18n="reviews.heading">reviews.heading</h2>

    <a class="google-summary"
       href="https://maps.app.goo.gl/VReCCn6HkGCqCrGdA"
       target="_blank" rel="noopener">
      <span class="google-logo">
        <span class="g-blue">G</span><span class="g-red">o</span><span class="g-yellow">o</span><span class="g-blue">g</span><span class="g-green">l</span><span class="g-red">e</span>
      </span>
      <span class="summary-stars">★★★★★</span>
      <span class="summary-score">5.0</span>
      <span class="summary-count" data-i18n="reviews.count">reviews.count</span>
    </a>
  </div>

  <div class="reviews-slider-wrap">
    <div class="reviews-grid">
      <article class="review-card">
        <div class="review-stars">★★★★★</div>
        <p class="review-text" data-i18n="reviews.r1.text">reviews.r1.text</p>
        <div class="reviewer">
          <div class="reviewer-avatar" style="background:var(--avatar-1)">A</div>
          <div class="reviewer-info">
            <span class="reviewer-name">Anna K.</span>
            <span class="reviewer-date" data-i18n="reviews.r1.date">reviews.r1.date</span>
          </div>
        </div>
      </article>

      <article class="review-card">
        <div class="review-stars">★★★★★</div>
        <p class="review-text" data-i18n="reviews.r2.text">reviews.r2.text</p>
        <div class="reviewer">
          <div class="reviewer-avatar" style="background:var(--avatar-2)">T</div>
          <div class="reviewer-info">
            <span class="reviewer-name">Thomas R.</span>
            <span class="reviewer-date" data-i18n="reviews.r2.date">reviews.r2.date</span>
          </div>
        </div>
      </article>

      <article class="review-card">
        <div class="review-stars">★★★★★</div>
        <p class="review-text" data-i18n="reviews.r3.text">reviews.r3.text</p>
        <div class="reviewer">
          <div class="reviewer-avatar" style="background:var(--avatar-3)">M</div>
          <div class="reviewer-info">
            <span class="reviewer-name">Monika W.</span>
            <span class="reviewer-date" data-i18n="reviews.r3.date">reviews.r3.date</span>
          </div>
        </div>
      </article>
    </div>
    <div class="reviews-controls"></div>
  </div>

  <div class="reviews-cta">
    <a class="btn-outline"
       href="https://maps.app.goo.gl/VReCCn6HkGCqCrGdA"
       target="_blank" rel="noopener"
       data-i18n="reviews.cta">
      reviews.cta
    </a>
  </div>
</section>
